<style>
html, body {
* {
  box-sizing: border-box;
}

  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
  touch-action: manipulation;
}

.screen {
  display: none;
  width: 100vw;
  height: 100vh;
  position: absolute;
}

#overworld {
  display: block;
  position: relative;
  overflow: hidden;
  background: black;
}

#world {
  position: absolute;
  left: 0;
  top: 0;

  width: 3000px;
  height: 3000px;

  will-change: transform;
}

#map {
  position: absolute;
  left: 0;
  top: 0;

  width: 100%;
  height: 100%;

  background-image: url("https://cdn.jsdelivr.net/gh/spiralku/POGO-2D@main/overworld.jpg");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
}

.player {
  width: 64px;
  height: 64px;

  position: absolute;

  left: 50%;
  top: 50%;

  transform: translate(-50%, -50%);

  z-index: 3;

  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;

  pointer-events: none;
}

.radius {
  width: 300px;
  height: 300px;

  border: 2px solid rgba(255,150,255,0.9);

  border-radius: 50%;

  position: absolute;

  left: 50%;
  top: 50%;

  transform: translate(-50%, -50%);

  z-index: 1;

  pointer-events: none;

  animation:
    radarPulse 2s linear infinite;
}

@keyframes radarPulse {

  0% {
    transform:
      translate(-50%, -50%)
      scale(0.2);

    opacity: 0;
  }
  
  70% {
    transform:
      translate(-50%, -50%)
      scale(1);
border-color:
      rgba(255,150,255,0.9);
    opacity: 0.8;
  }


  100% {
    transform:
      translate(-50%, -50%)
      scale(1);
border-color:
      rgba(255,255,255,0.9);
    opacity: 0.8;
  }

}

/* =========================
   2. PRELOAD FUNCTION
========================= */
function preloadAssets(urls, onProgress, onComplete) {
  let loaded = 0;

  urls.forEach(url => {
    const img = new Image();

    img.onload = () => {
      loaded++;
      updateProgress();
    };

    img.onerror = () => {
      loaded++;
      updateProgress();
    };

    img.src = url;
  });

  function updateProgress() {
    const percent = Math.floor((loaded / urls.length) * 100);

    onProgress(percent);

    if (loaded === urls.length) {
      onComplete();
    }
  }
}

/* =========================
   3. UI ELEMENTS
========================= */

  assets,

  // progress update
  (percent) => {
    percentText.textContent = percent + "%";
    bar.style.width = percent + "%";

  // done
  () => {
    setTimeout(() => {
      loadingScreen.style.display = "none";
      game.style.display = "block";

);

function getPlayerPokemon() {
  const p = battleState.playerTeam[battleState.activePlayerIndex];
  if (!p) return null;
  return p;
}

function getEnemyPokemon() {
  const e = battleState.enemyTeam[battleState.activeEnemyIndex];
  if (!e) return null;
  return e;
}
function randomLevel() {

  const roll = Math.random();

  // COMMON → 70%
  // Lv 1–15
  if (roll < 0.70) {
    return Math.floor(Math.random() * 15) + 1;
  }

  // RARE → 20%
  // Lv 16–25
  if (roll < 0.90) {
    return Math.floor(Math.random() * 10) + 16;
  }

  // VERY RARE → 8%
  // Lv 26–30
  if (roll < 0.98) {
    return Math.floor(Math.random() * 5) + 26;
  }

  // ULTRA RARE → 2%
  // Lv 31–35
  return Math.floor(Math.random() * 5) + 31;
}

function calculateCP(baseStats, iv, level) {

  const attack =
    baseStats.attack + iv.attack;

  const defense =
    baseStats.defense + iv.defense;

  const stamina =
    baseStats.hp + iv.stamina;

  // smoother level scaling
  const levelMultiplier =
    0.1 + (level * 0.012);

  const cp = Math.floor(

    (
      attack *
      Math.sqrt(defense) *
      Math.sqrt(stamina) *
      Math.pow(levelMultiplier, 2)
    ) / 7

  );

  return Math.max(10, cp);
}

function calculateBattleStats(baseStats, iv, level) {

  const levelBonus =
    1 + (level * 0.05);

  return {

    attack:
      Math.floor(
        (baseStats.attack + iv.attack)
        * levelBonus
      ),

    defense:
      Math.floor(
        (baseStats.defense + iv.defense)
        * levelBonus
      ),

    maxHP:
      Math.floor(
        (baseStats.hp + iv.stamina)
        * levelBonus
      )

  };
}

function renderSwitchBar() {

  const bar = document.getElementById("switchBar");
  bar.innerHTML = "";

  const maxCooldown = 3000;

  battleState.playerTeam.forEach((p, i) => {

    // hide active Pokémon
    if (i === battleState.activePlayerIndex) return;

    // hide fainted Pokémon
    if (!p || p.battleStats.currentHP <= 0) return;

    const box = document.createElement("div");
    box.className = "switchIcon";

    // CP TEXT
    const cp = document.createElement("div");
    cp.className = "switchCP";
    cp.innerText = `CP ${p.cp}`;

    // IMAGE
    const img = document.createElement("div");
    img.className = "switchImg";
    img.style.backgroundImage = `url(${p.image})`;

    // HP BAR
    const hpBar = document.createElement("div");
    hpBar.className = "switchHPBar";

    const hpFill = document.createElement("div");
    hpFill.className = "switchHPFill";

    const hpPercent =
      (p.battleStats.currentHP / p.battleStats.maxHP) * 100;

    hpFill.style.width = hpPercent + "%";

    hpBar.appendChild(hpFill);

    // OVERLAY (COOLDOWN)
    const overlay = document.createElement("div");
    overlay.className = "switchOverlay";

    const progress = getSwitchCooldownProgress();

// invert so it "drains down"
overlay.style.height = (progress * 100) + "%";

    // CLICK SWITCH
    box.onclick = () => {
      if (battleState.switchCooldown > 0) return;
      switchPlayerPokemon(i);
    };

    box.appendChild(cp);
    box.appendChild(img);
    box.appendChild(hpBar);

    bar.appendChild(box);
    box.appendChild(overlay);
  });
}

function playEvolutionAnimation(oldPokemon, newPokemon, onComplete) {

  const scene = document.getElementById("evoScene");
const evoName =
  document.getElementById("evoName");
  const oldImg =
    document.getElementById("evoOld");

  const newImg =
    document.getElementById("evoNew");

  scene.classList.remove("hidden");

  oldImg.src = oldPokemon.image;
  newImg.src = newPokemon.image;

  // initial state
  oldImg.style.opacity = "1";
  newImg.style.opacity = "0";

  oldImg.style.filter = "brightness(1)";
  newImg.style.filter = "brightness(1)";

  oldImg.style.transform =
    "translateY(40px)";

  newImg.style.transform =
    "translateY(-80px)";

  // =========================
  // 1. OLD POKEMON WOBBLE
  // =========================
evoName.textContent = oldPokemon.name;
evoName.style.opacity = "1";
  let wobbleCount = 0;

  const wobbleInterval = setInterval(() => {

    oldImg.style.transform =
      `translateY(40px)
       rotate(${wobbleCount % 2 === 0 ? 4 : -4}deg)`;

    wobbleCount++;

    if (wobbleCount > 6) {

      clearInterval(wobbleInterval);
evoName.style.opacity = "0";
      oldImg.style.transform =
        "translateY(40px) rotate(0deg)";

      riseUp();
    }

  }, 120);

  // =========================
  // 2. MOVE UPWARD
  // =========================

  function riseUp() {

    oldImg.style.transition =
      "transform 1.2s ease";

    oldImg.style.transform =
      "translateY(-80px) scale(1.05)";
      

    setTimeout(() => {
      blinkSequence();
    }, 1200);
  }

  // =========================
  // 3. BLINK OLD/NEW
  // =========================

  function blinkSequence() {

    let blink = 0;

    const blinkInterval = setInterval(() => {

      const showOld =
        blink % 2 === 0;

      oldImg.style.opacity =
        showOld ? "1" : "0";

      newImg.style.opacity =
        showOld ? "0" : "1";

      // both bright
      oldImg.style.filter =
        "brightness(50)";

      newImg.style.filter =
        "brightness(50)";

      blink++;

      if (blink > 14) {

        clearInterval(blinkInterval);

        oldImg.style.opacity = "0";
        newImg.style.opacity = "1";
        

        descendDown();
      }

    }, 180);
  }

  // =========================
  // 4. NEW POKEMON DOWNWARD
  // =========================

  function descendDown() {

    newImg.style.transition =
  "transform 1s ease, filter 0.5s ease";

newImg.style.transform =
  "translateY(40px) scale(1.05)";

newImg.style.filter =
  "brightness(1)";
    setTimeout(() => {
    
    evoName.textContent = newPokemon.name;
evoName.style.opacity = "1";
    }, 2000);
    
    setTimeout(() => {
    finalWobble();
    }, 3000);
    
  }

  // =========================
  // 5. FINAL WOBBLE
  // =========================

  function finalWobble() {

  let wobbleCount = 0;

  const wobbleInterval = setInterval(() => {

    newImg.style.transform =
  `translateY(40px)
   scale(1.05)
   rotate(${wobbleCount % 2 === 0 ? 4 : -4}deg)`;
   
    wobbleCount++;
console.log(wobbleCount);
    if (wobbleCount > 6) {

      clearInterval(wobbleInterval);

      newImg.style.transform =
  "translateY(40px) scale(1.05) rotate(0deg)";
      
      idleFinish();
    }

  }, 120);
}

  // =========================
  // 6. IDLE
  // =========================

  function idleFinish() {
newImg.style.transition =

      "transform 2s ease";

    newImg.style.transform =
      "translateY(-80px) scale(1.05)";
      evoName.style.opacity = "0";
    setTimeout(() => {

      scene.classList.add("hidden");

      onComplete();
    }, 2000);
  }
}


function evolvePokemon() {

  if (!selectedPokemon) return;

  const nextName = selectedPokemon.evolvesTo;

  if (!nextName) {
    showCatchMessage("This Pokémon cannot evolve!");
    return;
  }

  const cost = selectedPokemon.evolutionCost || 0;

  const candy =
    candyBag[selectedPokemon.candyFam] || 0;

  if (candy < cost) {
    showCatchMessage("Not enough candy!");
    return;
  }

  const oldPokemon = { ...selectedPokemon };
  const newData = POKEDEX[nextName];

  playEvolutionAnimation(oldPokemon, newData, () => {

    // 💥 ONLY NOW apply evolution

    candyBag[selectedPokemon.candyFam] -= cost;

    Object.assign(selectedPokemon, newData);

    const stats = calculateBattleStats(
      selectedPokemon.baseStats,
      selectedPokemon.iv,
      selectedPokemon.level
    );

    selectedPokemon.battleStats = {
      ...stats,
      currentHP: stats.maxHP,
      energy: 0
    };

    selectedPokemon.cp = calculateCP(
      selectedPokemon.baseStats,
      selectedPokemon.iv,
      selectedPokemon.level
    );

    renderStorage();
    showPokemonInfo(selectedPokemon);

    showCatchMessage(`Evolved to ${selectedPokemon.name}!`);
  });
}

function powerUpPokemon() {

  const p = viewingPokemon;

  if (!p) return;

  const base = POKEDEX[p.name].baseStats;

  if (p.level >= 50) {
    alert("Max Level!");
    return;
  }

  const cost = getPowerUpCost(p.level);

  if (stardust < cost) {
    alert("Not enough Stardust!");
    return;
  }

  stardust -= cost;

  p.level++;

  // CP recalculation
  p.cp = calculateCP(base, p.iv, p.level);

  // ALWAYS rebuild stats safely
  const stats = calculateBattleStats(base, p.iv, p.level);

  p.battleStats = {
    attack: stats.attack,
    defense: stats.defense,
    maxHP: stats.maxHP,
    currentHP: stats.maxHP
  };

  showPokemonInfo(p);
  renderStorage();
}

// -------- SPAWN --------
function initialSpawn() {
  const count = 30; // starting density (adjust later)

  for (let i = 0; i < count; i++) {
    spawnOnePokemon(true);
  }
}

function getVisiblePokemon() {
  return overworldPokemon.filter(p => {
    const dx = p.x - player.x;
    const dy = p.y - player.y;
    return dx * dx + dy * dy < 500 * 500;
  });
}

function spawnOnePokemon() {

  // SPAWN CAP
  if (overworldPokemon.length >= MAX_POKEMON) return;

  const p = createPokemon();

  const angle = Math.random() * Math.PI * 2;

  // --- MIXED SPAWN SYSTEM ---
  const roll = Math.random();

  let radius;

  if (roll < 0.55) {
    // NEAR PLAYER SPAWN
    radius = 250 + Math.random() * 400;
  } else {
    // WIDE WORLD SPAWN
    radius = 600 + Math.random() * 1400;
  }

  // soften clustering randomness
  radius *= 0.8 + Math.random() * 0.4;

  // --- POSITION (WORLD SPACE) ---
  let x = player.x + Math.cos(angle) * radius;
  let y = player.y + Math.sin(angle) * radius;

  // --- WORLD BOUNDS (3000x3000 centered-safe) ---
  const min = 50;
  const max = 2950;

  x = Math.max(min, Math.min(max, x));
  y = Math.max(min, Math.min(max, y));

  // --- ANTI-CLUMP (PREVENT STACKING) ---
  const tooClose = overworldPokemon.some(other => {
    const dx = other.x - x;
    const dy = other.y - y;
    return Math.sqrt(dx * dx + dy * dy) < 80;
  });

  if (tooClose) return;

  p.x = x;
  p.y = y;

  // --- RARITY SYSTEM ---
  const rollRarity = Math.random();

  if (rollRarity < 0.05) {
    p.rarity = "rare";
  } else if (rollRarity < 0.25) {
    p.rarity = "uncommon";
  } else {
    p.rarity = "common";
  }

  // --- DESPAWN TIMER ---
  const lifetime =
    MIN_DESPAWN_TIME +
    Math.random() * (MAX_DESPAWN_TIME - MIN_DESPAWN_TIME);

  p.despawnAt = Date.now() + lifetime;

  overworldPokemon.push(p);
}

function updatePokemonDespawn() {

  const now = Date.now();

  overworldPokemon = overworldPokemon.filter(p => {

    const alive = p.despawnAt > now;

    // REMOVE DOM + CACHE WHEN DESPAWNED
    if (!alive) {

      const el = pokemonEls.get(p.id);

      if (el) {
        el.remove();
      }

      pokemonEls.delete(p.id);

    }

    return alive;

  });

}

function renderPokemon() {

  const world = document.getElementById("world");

  getVisiblePokemon().forEach(p => {

    let el = pokemonEls.get(p.id);

    // CREATE ONLY ONCE
    if (!el) {
      el = document.createElement("div");
      el.className = "pokemon";

      world.appendChild(el);
      pokemonEls.set(p.id, el);

      // click only set once
      el.onclick = () => {
        const dx = p.x - player.x;
        const dy = p.y - player.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance <= 150) {
          startEncounter(p);
        }
      };
    }

    // UPDATE POSITION EVERY FRAME
    el.style.left = p.x + "px";
    el.style.top = p.y + "px";

    // VISUAL UPDATE
    if (p.image) {
      el.style.backgroundImage = `url(${p.image})`;
      el.style.backgroundSize = "cover";
      el.style.backgroundPosition = "center";
    } else {
      el.style.background = p.color;

      if (p.shape === "circle") el.style.borderRadius = "50%";
      else if (p.shape === "rounded") el.style.borderRadius = "10px";
      else el.style.borderRadius = "0";
    }

    // DISTANCE EFFECT (light/dark)
    const dx = p.x - player.x;
    const dy = p.y - player.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    el.classList.remove("far", "near");

if (distance < 150) {

  el.classList.remove("far");
  el.classList.add("near");

} else {

  el.classList.remove("near");
  el.classList.add("far");

}

  });
}

// -------- JOYSTICK --------
let joystick = document.getElementById("joystick");
let stick = document.getElementById("stick");
let move = { x: 0, y: 0 };

joystick.addEventListener("touchmove", e => {
  const rect = joystick.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left - 50;
  const y = e.touches[0].clientY - rect.top - 50;

  move.x = x / 50;
  move.y = y / 50;

const length = Math.sqrt(move.x * move.x + move.y * move.y);

if (length > 1) {
  move.x /= length;
  move.y /= length;
}

  stick.style.left = (30 + move.x * 20) + "px";
  stick.style.top = (30 + move.y * 20) + "px";
});

joystick.addEventListener("touchend", () => {
  move = { x: 0, y: 0 };
  stick.style.left = "30px";
  stick.style.top = "30px";
});

// ------ BATTLE SYSTEM ------

function startBattle(playerTeam) {

  battleState.active = true;
  battleState.battleStarted = false;

  // ===== PLAYER TEAM =====
  battleState.playerTeam = playerTeam.map(p => {
    return JSON.parse(JSON.stringify(p));
  });

  battleState.activePlayerIndex = 0;

  // reset battle stats ONLY for safety
  battleState.playerTeam.forEach(p => {
    p.battleStats.currentHP = p.battleStats.maxHP;
    p.battleStats.energy = 0;
    p.battleStats.cooldown = 0;
  });

  // ===== ENEMY TEAM =====
  battleState.enemyTeam = [];

  const playerLevel =
    battleState.playerTeam[0].level;

  for (let i = 0; i < 3; i++) {

    const enemy = createPokemon();

    const enemyLevel =
      Math.max(
        1,
        Math.min(
          50,
          playerLevel + Math.floor(Math.random() * 11 - 5)
        )
      );

    enemy.level = enemyLevel;

    enemy.cp = calculateCP(
      enemy.baseStats,
      enemy.iv,
      enemy.level
    );

    enemy.battleStats =
      calculateBattleStats(
        enemy.baseStats,
        enemy.iv,
        enemy.level
      );

    enemy.battleStats.currentHP =
      enemy.battleStats.maxHP;

    enemy.battleStats.energy = 0;
    enemy.battleStats.cooldown = 0;

    battleState.enemyTeam.push(
      JSON.parse(JSON.stringify(enemy))
    );
  }

  battleState.activeEnemyIndex = 0;

  battleState.playerCooldown = 0;
  battleState.enemyCooldown = 0;
  battleState.enemyAI = 0;

  const player = getPlayerPokemon();
  const enemy = getEnemyPokemon();

  updateBattleUI();

  document.getElementById("playerPokemon")
    .style.backgroundImage = `url(${player.image})`;

  document.getElementById("enemyPokemon")
    .style.backgroundImage = `url(${enemy.image})`;

  showScreen("battleScreen");
updateActivePokemonUI()
  showBattleText("3");

  setTimeout(() => showBattleText("2"), 700);
  setTimeout(() => showBattleText("1"), 1400);

  setTimeout(() => {
    showBattleText("GO!");
    battleState.battleStarted = true;
  }, 2100);

  renderSwitchBar();
}

function switchPlayerPokemon(index) {

  if (battleState.switchCooldown > 0) return;

  const target = battleState.playerTeam[index];
  if (!target) return;

  if (target.battleStats.currentHP <= 0) return;

  if (index === battleState.activePlayerIndex) return;

  battleState.activePlayerIndex = index;
  battleState.switchCooldown = 15000;
renderSwitchBar();
  updateBattleUI();
  updateActivePokemonUI();
}

function getSwitchCooldownProgress() {
  const max = 15000; // same as your cooldown
  return Math.max(0, battleState.switchCooldown / max);
}

function autoSwitchPlayer() {

  const nextIndex =
    battleState.playerTeam.findIndex(
      p => p.battleStats.currentHP > 0
    );

  if (nextIndex === -1) {
    endBattle("lose");
    return;
  }

  battleState.activePlayerIndex = nextIndex;
renderSwitchBar();
  updateBattleUI();
}

function showBattleText(text) {

  const el =
    document.getElementById("battleText");

  el.innerText = text;

  el.style.opacity = "1";

  setTimeout(() => {
    el.style.opacity = "0";
  }, 500);
}

function dealDamage(attacker, defender, move) {

  if (!attacker || !defender) return;

  const atk = attacker.battleStats.attack;
  const def = defender.battleStats.defense;

  let damage =
    (atk + move.damage - def * 0.3) * 0.08;

  damage = Math.max(1, Math.floor(damage));

  defender.battleStats.currentHP -= damage;

  if (defender.battleStats.currentHP <= 0) {

    defender.battleStats.currentHP = 0;

    // MARK FAINT FIRST
    const isPlayer = (defender === getPlayerPokemon());

    checkBattleEnd(); // 🔥 IMPORTANT FIRST

    if (battleState.active === false) return;

    if (isPlayer) {
      autoSwitchPlayer();
    } else {
      autoSwitchEnemy();
    }

    // SAFE UI UPDATE AFTER STATE IS STABLE
    updateBattleUI();
    updateActivePokemonUI();

    return;
  }

  // normal mid-battle update
  updateBattleUI();
}

function autoSwitchEnemy() {

  const nextIndex =
    battleState.enemyTeam.findIndex(
      p => p.battleStats.currentHP > 0
    );

  if (nextIndex === -1) {

    endBattle("win");
    return;
  }

  battleState.activeEnemyIndex = nextIndex;
renderSwitchBar();
  updateBattleUI();

  // ONLY CALL IF STILL VALID
  const enemy = getEnemyPokemon();
  if (enemy) updateActivePokemonUI();
}

function playerFastAttack() {

  if (!battleState.active) return;

if (!battleState.battleStarted) return;

  if (battleState.playerCooldown > 0) return;

  const player = getPlayerPokemon();
  const enemy = getEnemyPokemon();

  const move =
    MOVES[player.moves.fast];

  dealDamage(player, enemy, move);

  player.battleStats.energy +=
    move.energyGain;

  if (player.battleStats.energy > 100) {
    player.battleStats.energy = 100;
  }

  battleState.playerCooldown =
    move.cooldown;

  updateBattleUI();

  checkBattleEnd();
}

function endBattle(result) {

  battleState.active = false;
  battleState.battleStarted = false;

  if (result === "win") {
    showBattleText("YOU WIN!");
  }

  if (result === "lose") {
    showBattleText("YOU LOSE!");
  }

  // ⏳ GIVE TIME FOR TEXT TO BE SEEN
  setTimeout(() => {

    fadeToBlack(() => {

      setTimeout(() => {

        showScreen("battlePartyScreen");

        // reset fade
        document.getElementById("battleFade").style.opacity = "0";

      }, 200);

    });

  }, 1200); // <- IMPORTANT: text display time
}

function enemyAttack() {

  const player = getPlayerPokemon();
const enemy = getEnemyPokemon();

if (!player || !enemy) return;

  const move =
    MOVES[enemy.moves.fast];

  dealDamage(enemy, player, move);

  enemy.battleStats.energy +=
    move.energyGain;

  if (enemy.battleStats.energy > 100) {
    enemy.battleStats.energy = 100;
  }

  battleState.enemyCooldown =
    move.cooldown;

  updateBattleUI();

  checkBattleEnd();
}

function useChargedMove() {

  if (!battleState.active) return;

if (!battleState.battleStarted) return;

  const player = getPlayerPokemon();
  const enemy = getEnemyPokemon();

  const move =
    MOVES[player.moves.charged];

  if (
    player.battleStats.energy <
    move.energyCost
  ) return;

  player.battleStats.energy -=
    move.energyCost;

  dealDamage(player, enemy, move);

  showBattleText(move.type.toUpperCase() + "!");

  updateBattleUI();

  checkBattleEnd();
}

function checkBattleEnd() {

  const playerAlive =
    battleState.playerTeam.some(
      p => p.battleStats.currentHP > 0
    );

  const enemyAlive =
    battleState.enemyTeam.some(
      p => p.battleStats.currentHP > 0
    );

  if (!enemyAlive) {
    endBattle("win");
  }

  if (!playerAlive) {
    endBattle("lose");
  }
}

function updateBattle(delta) {

  if (!battleState.active) return;

if (!battleState.battleStarted) return;

  if (battleState.playerCooldown > 0) {
    battleState.playerCooldown -= delta;
  }

  if (battleState.enemyCooldown > 0) {
    battleState.enemyCooldown -= delta;
  }

  battleState.enemyAI += delta;

  if (
    battleState.enemyAI >= 700 &&
    battleState.enemyCooldown <= 0
  ) {

    enemyAttack();

    battleState.enemyAI = 0;
  }
}

    displayList.sort((a, b) => a.dex - b.dex);

    displayList.sort((a, b) => b.dex - a.dex);
  } else if (sortType === "cpDesc") {
    displayList.sort((a, b) => b.cp - a.cp);

ball.addEventListener("touchstart", e => {
  isDragging = true;
  isThrowing = false;

  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;

ball.addEventListener("touchend", e => {
  if (!isDragging) return;
  isDragging = false;

  const endX = e.changedTouches[0].clientX;
  const endY = e.changedTouches[0].clientY;

  // START = bottom center (ball start position)
  startPos.x = window.innerWidth / 2;
  startPos.y = window.innerHeight - 80;

  // END = where player released (target direction)
  endPos.x = endX;
  endPos.y = endY;

  // ðŸŽ¯ CURVE (spin effect)
  curveStrength = (endX - startX) * 2;

  // ðŸŽ¯ CONTROL POINT (this creates the arc)
  controlPos.x = (startPos.x + endPos.x) / 2 + curveStrength;
  controlPos.y = Math.min(startPos.y, endPos.y) - 300;

  throwProgress = 0;
  isThrowing = true;
});

function updateBall() {
// ðŸŽ¯ SHAKE ANIMATION
if (isShaking) {

  // â¸ï¸ pause logic
  if (shakePauseTimer > 0) {
    shakePauseTimer--;
    
    // keep ball centered during pause
    ball.style.transform = `translate(-50%, -50%) scale(0.5)`;
    return;
  }

  shakeTimer++;

  // normal shake movement
  if (shakeTimer % 6 === 0) {
    shakeDir *= -1;
    shakeOffset = shakeDir * 1;
  }

  ball.style.transform = `translate(calc(-50% + ${shakeOffset}px), -50%) scale(0.5)`;

  // count shakes
  if (shakeTimer % 20 === 0) {
    shakeCount++;

    // ðŸŽ¯ every 2 shakes â†’ add pause
    if (shakeCount % 2 === 0) {
      shakePauseTimer = 30; // duration of pause
    }
  }

  // finish
  if (shakeCount >= 6) {
    isShaking = false;
    finishCatch();
  }

  return;
}
// ðŸŽ¯ catch animation overrides throw
if (catchAnimating) {
  catchProgress += 0.04;

  if (catchProgress >= 1) {
    catchAnimating = false;
    catchProgress = 1;
  }

  const t = catchProgress;

  // smooth easing (optional but nice)
  const ease = t * (2 - t);

  const x = catchStart.x + (catchTarget.x - catchStart.x) * ease;
  const y = catchStart.y + (catchTarget.y - catchStart.y) * ease;

  ballPos.x = x;
  ballPos.y = y;

  ball.style.left = x + "px";
  ball.style.top = y + "px";
  ball.style.transform = "translate(-50%, -50%) scale(0.5)";

  return; // stop normal throw logic
}
  if (!isThrowing) return;

  throwProgress += 1 / throwDuration;

  if (throwProgress >= 1) {
    isThrowing = false;
    resetBall();
    return;
  }

  const t = throwProgress;
// detect peak (when ball starts going down)
if (ballPos.y > lastY) {
  hasPassedPeak = true;
}
lastY = ballPos.y;

  // ðŸŽ¯ QUADRATIC BEZIER
  const x =
    (1 - t) * (1 - t) * startPos.x +
    2 * (1 - t) * t * controlPos.x +
    t * t * endPos.x;

  const y =
    (1 - t) * (1 - t) * startPos.y +
    2 * (1 - t) * t * controlPos.y +
    t * t * endPos.y;

  ballPos.x = x;
  ballPos.y = y;

  // ðŸŽ¯ DEPTH SCALE (simple, no locking)
  let scale = 1 - t * 0.6;
  scale = Math.max(0.4, scale);

  const rotation = throwProgress * 360; // spins 2x
ball.style.transform = `translate(-70%, -70%) scale(${scale}) rotate(${rotation}deg)`;
  ball.style.left = x + "px";
  ball.style.top = y + "px";

  checkHitAfterCurve();
}

function checkHitAfterCurve() {
  // âŒ must pass peak first (curve finished)
  if (!hasPassedPeak) return;

  // âŒ must be near end (slow phase)
  if (throwProgress < 0.75) return;

  const box = document.getElementById("pokeBox");
  const rect = box.getBoundingClientRect();

  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  const dx = ballPos.x - centerX;
  const dy = ballPos.y - centerY;
  const distance = Math.sqrt(dx * dx + dy * dy);

  const hitRadius = rect.width * 0.35;

  if (distance < hitRadius) {
    isThrowing = false;
    startCatch();
  }
}


function startCatch() {
  isThrowing = false;

const titl = document.getElementById("pokeTitle");
  const box = document.getElementById("pokeBox");

  // hide pokemon
  titl.style.opacity = 0;
  box.style.opacity = 0;

  const rect = box.getBoundingClientRect();

  // ðŸŽ¯ start = current ball position
  catchStart.x = ballPos.x;
  catchStart.y = ballPos.y;

  // ðŸŽ¯ target = bottom of pokemon (your style)
  catchTarget.x = ballPos.x;
  catchTarget.y = rect.bottom;

  catchProgress = 0;

  // â³ delay before ball moves
  setTimeout(() => {
    catchAnimating = true;

    // â³ AFTER movement finishes â†’ start shake
    setTimeout(() => {
      startShake();
    }, 500); // tweak if needed

  }, 300);
}

function startShake() {
  isShaking = true;
  shakeCount = 0;
  shakeTimer = 0;
  shakeDir = 1;
}

function finishCatch() {
  const box = document.getElementById("pokeBox");
  
  const rect = box.getBoundingClientRect();

  const centerX = ballPos.x;
  const centerY = rect.bottom;

  const roll = Math.random();

const catchChance = currentPokemon.catchRate;

const escapeChance = currentPokemon.escapeRate;

const fleeChance = currentPokemon.fleeRate;

if (roll < catchChance) {

  createStarBurst(centerX, centerY);

  const dustEarned =
    1000000 + Math.floor(Math.random() * 200);

  stardust += dustEarned;

const species=
currentPokemon.candyFam;

if(!candyBag[species]){
candyBag[species]=0;
}

candyBag[species]+= 10000 ||
currentPokemon.candyReward || 3;

  setTimeout(() => {
    showCatchMessage("Gotcha!");
  }, 400);

  setTimeout(() => {
    showCatchMessage(
      `${currentPokemon.name} was caught!`
    );
  }, 1600);

  setTimeout(() => {

    hideCatchMessage();

    storage.push(currentPokemon);

    renderStorage();
removePokemon(currentPokemon.id);
    overworldPokemon =
      overworldPokemon.filter(
        p => p.id !== currentPokemon.id
      );

    showRewardPopup(
      currentPokemon,
      dustEarned
    );

    resetBall();

  }, 3200);

} else if (

  roll < catchChance + escapeChance

) {

  // 💥 BREAKOUT
  breakoutAnimation();

  setTimeout(() => {

    

    setTimeout(() => {
      hideCatchMessage();
    }, 1200);

    resetBall();

  }, 500);

} else {

  // 👋 FLEE
  fleeAnimation();

  setTimeout(() => {

    showCatchMessage(
      `Oh no! The wild ${currentPokemon.name} fled.`
    );

    // remove from overworld
    removePokemon(currentPokemon.id);
    overworldPokemon =
      overworldPokemon.filter(
        p => p.id !== currentPokemon.id
      );

    setTimeout(() => {

      hideCatchMessage();

      showScreen("overworld");

      resetBall();

    }, 1500);

  }, 500);

}
}

function resetBall() {
  isThrowing = false;
  catchAnimating = false;
  
hasPassedPeak = false;
lastY = 0;
  ball.style.left = "50%";
  ball.style.bottom = "40px";
  ball.style.top = "";
  ball.style.transform = "translateX(-50%) scale(1)";
}

function createStarBurst(x, y) {
  for (let i = 0; i < 10; i++) {
    const star = document.createElement("div");

    star.style.position = "absolute";
    star.style.left = x + "px";
    star.style.top = y + "px";
    star.style.width = "6px";
    star.style.height = "6px";
    star.style.background = "yellow";
    star.style.borderRadius = "50%";
    star.style.pointerEvents = "none";
    star.style.zIndex = 999;

    document.body.appendChild(star);

    const angle = Math.random() * Math.PI * 2;
    const distance = 40 + Math.random() * 40;

    const targetX = x + Math.cos(angle) * distance;
    const targetY = y + Math.sin(angle) * distance;

    star.animate([
      { transform: "translate(0,0)", opacity: 1 },
      { transform: `translate(${targetX - x}px, ${targetY - y}px)`, opacity: 0 }
    ], {
      duration: 600,
      easing: "ease-out"
    });

    setTimeout(() => star.remove(), 600);
  }
}

function breakoutAnimation() {
const titl = document.getElementById("pokeTitle");
  const box = document.getElementById("pokeBox");

  // show pokemon again
  titl.style.opacity = 1;
  box.style.opacity = 1;

  // quick jump effect
  box.animate([
    { transform: "translateY(0px)" },
    { transform: "translateY(-40px)" },
    { transform: "translateY(0px)" }
  ], {
    duration: 400,
    easing: "ease-out"
  });
  titl.animate([
    { transform: "translateY(0px)" },
    { transform: "translateY(-40px)" },
    { transform: "translateY(0px)" }
  ], {
    duration: 400,
    easing: "ease-out"
  });

  // ball knockback
  ball.animate([
    { transform: "translate(-50%, -50%) scale(0.5)" },
    { transform: "translate(-50%, -80%) scale(0.6)" },
    { transform: "translate(-50%, -50%) scale(0.5)" }
  ], {
    duration: 300
  });
}

function selectBattlePokemon(pokemon) {

  if (!choosingBattlePokemon) return;

  const exists = selectedBattleParty.find(p => p.id === pokemon.id);

  if (exists) {
    selectedBattleParty =
      selectedBattleParty.filter(p => p.id !== pokemon.id);
  } else {
    if (selectedBattleParty.length >= 3) return;
    selectedBattleParty.push(pokemon);
  }

  updateBattlePartyUI();
}

function updateBattlePartyUI() {

  const wrappers =
    document.querySelectorAll(".partySlotWrapper");

  wrappers.forEach((wrap, i) => {

    const cpEl =
      wrap.querySelector(".slotCP");

    const slotEl =
      wrap.querySelector(".partySlot");

    const nameEl =
      wrap.querySelector(".slotName");

    const poke =
      selectedBattleParty[i];

    if (!poke) {

      slotEl.style.backgroundImage = "";
      cpEl.innerText = "";
      nameEl.innerText = "";

      return;
    }

    slotEl.style.backgroundImage =
      `url(${poke.image})`;

    cpEl.innerText =
      `CP ${poke.cp}`;

    nameEl.innerText =
      poke.name;
  });
}

  function saveGame() {
  const data = {
    player,
    storage,
    overworldPokemon,
    stardust,
    candyBag,
    distanceWalked,
    lastPlayerPos
  };

  localStorage.setItem("pokemonSave", JSON.stringify(data));
}

function loadGame() {
  const data = JSON.parse(localStorage.getItem("pokemonSave"));
  if (!data) return;

  player = data.player;
  stardust = data.stardust;
  candyBag = data.candyBag;
  distanceWalked = data.distanceWalked;
  lastPlayerPos = data.lastPlayerPos;

  overworldPokemon = data.overworldPokemon.map(p => {

  // NEW REMAINING LIFETIME
  const lifetime =
    MIN_DESPAWN_TIME +
    Math.random() *
    (MAX_DESPAWN_TIME - MIN_DESPAWN_TIME);

  return {
    ...p,

    // RESET DESPAWN TIMER FROM NOW
    despawnAt: Date.now() + lifetime
  };

});
  // 🔥 IMPORTANT: rebuild Pokémon
  storage = data.storage.map(p => {
    const base = POKEDEX[p.name].baseStats;

    return {
      ...p,
      cp: calculateCP(base, p.iv, p.level),
      battleStats: calculateBattleStats(base, p.iv, p.level)
    };
  });

  
  renderStorage();
  renderPokemon();
}

  function deleteSave() {
  const confirmDelete = confirm("Delete all saved data? This cannot be undone.");

  if (!confirmDelete) return;

  // clear storage save
  localStorage.removeItem("pokemonSave");

  // reset game state
  storage = [];
  stardust = 0;
  candyBag = {};
  overworldPokemon = [];

  player = {
    x: 1500,
    y: 1500,
    direction: "down",
    sprites: player.sprites
  };

  selectedPokemon = null;
  viewingPokemon = null;
  currentPokemon = null;

  distanceWalked = 0;
  lastPlayerPos = { x: player.x, y: player.y };

  // UI refresh
  renderStorage();
  renderPokemon();

  showScreen("overworld");

  alert("Save deleted!");
  location.reload();
}
